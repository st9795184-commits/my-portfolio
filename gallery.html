<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudip Tamang | Sweet College Memories</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            color: #ffffff;
            min-height: 100vh;
        }

        /* Animated Background - Tihar Lightning Effect */
        .lightning-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .lightning-bg::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(255, 200, 50, 0.15), transparent 70%);
            animation: glowPulse 3s ease-in-out infinite;
        }

        .lightning-bg::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 60%, rgba(255, 100, 50, 0.1), transparent 70%);
            animation: glowPulse 4s ease-in-out infinite reverse;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Floating diyas (oil lamps) effect */
        .diya {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.6;
            animation: floatDiya 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes floatDiya {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.4; }
            50% { transform: translateY(-20px) rotate(5deg); opacity: 0.8; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        .header {
            text-align: center;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }

        .animated-title {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #ffd700, #ff6b35);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleShine 3s ease-in-out infinite, titleGlow 2s ease-in-out infinite;
            margin-bottom: 0.5rem;
        }

        @keyframes titleShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 107, 53, 0.3); }
            50% { text-shadow: 0 0 30px rgba(255, 215, 0, 0.5); }
        }

        .title-heart {
            font-size: 2rem;
            display: inline-block;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .subtitle {
            color: #ccc;
            margin-top: 0.5rem;
        }

        .back-btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #ffd700;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .back-btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .gallery-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s;
            border: 1px solid rgba(255, 215, 0, 0.2);
            animation: borderGlow 3s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% { border-color: rgba(255, 215, 0, 0.2); box-shadow: 0 0 5px rgba(255, 215, 0, 0.1); }
            50% { border-color: rgba(255, 215, 0, 0.6); box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        }

        .gallery-item:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        .photo-box {
            height: 250px;
            background: #0f0f23;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .gallery-item:hover .photo-box img {
            transform: scale(1.05);
        }

        .photo-placeholder {
            font-size: 3rem;
            color: #ffd700;
            text-align: center;
        }

        .photo-placeholder i {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .photo-placeholder span {
            font-size: 0.8rem;
            display: block;
            color: #aaa;
        }

        .gallery-item p {
            padding: 1rem;
            text-align: center;
            font-weight: 500;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .footer {
            text-align: center;
            padding: 2rem;
            color: #888;
            margin-top: 2rem;
            border-top: 1px solid rgba(255,215,0,0.2);
        }

        @media (max-width: 768px) {
            .animated-title {
                font-size: 2rem;
            }
            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .photo-box {
                height: 200px;
            }
        }
    </style>
</head>
<body>

<div class="lightning-bg"></div>

</div>

<div class="footer">
    <p>© 2026 Sudip Tamang | Every picture tells a story 🪔♥️</p>

<script>
    // Simple fade-in animation for gallery items
    const items = document.querySelectorAll('.gallery-item');
    items.forEach((item, index) => {
        item.style.opacity = '0';
        item.style.transform = 'translateY(30px)';
        item.style.transition = 'all 0.5s ease';
        setTimeout(() => {
            item.style.opacity = '1';
            item.style.transform = 'translateY(0)';
        }, index * 100);
    });
</script>
